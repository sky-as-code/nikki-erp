GENERAL:
  APP_NAME: "Nikki ERP"

CORE:
  CQRS:
    # Number of seconds before a CQRS request is timed out
    REQUEST_TIMEOUT_SECS: 50
  DB:
    # Supported dialects: postgres | mysql
    DIALECT: postgres
    # Host:Port pair of the database server
    HOST_PORT: localhost:5432
    # Database name
    DATABASE: nikki_erp
    # Database username can be specified in env var CORE_DB_USER or
    # in config item CORE.DB.USER_FILE which contains a secret file path.
    #USER: "Do not specify here"
    # Database password can be specified in env var CORE_DB_PASSWORD or
    # in config item CORE.DB.PASSWORD_FILE which contains a secret file path.
    #PASSWORD: "Do not specify here"
    # Whether to establish TLS connection to database
    TLS_ENABLED: true
    # Whether to write ORM debug SQL queries
    ORM_DEBUG_ENABLED: false
    MAX_IDLE_CONNS: 100
    MAX_OPEN_CONNS: 1000
    CONN_MAX_LIFETIME_SECS: 3600
  EVENT:
    REDIS_HOST: localhost
    # A comma-separated list of Redis hosts for cluster mode
    # REDIS_HOSTS:
    # Redis port, applied for all hosts in REDIS_HOSTS
    REDIS_PORT: 6379
    # Regis database. See: https://redis.io/docs/latest/commands/select/
    REDIS_DB: 1
    # Redis password can be specified in env var CORE_EVENT_REDIS_PASSWORD or
    # in config item CORE.EVENT.REDIS_PASSWORD_FILE which contains a secret file path.
    #REDIS_PASSWORD: "Do not specify here"
  HTTP:
    # Base path to access REST API, default is "/" which means API URL is http://example.com/,
    # Example: BASE_PATH="/api", the API URL would be http://example.com/api.
    BASE_PATH: ""
    # Host name for HTTP Server to bind
    HOST: "127.0.0.1"
    # Port number for HTTP Server to listen
    PORT: 8080
    # Port number for HTTPS Server to listen
    HTTPS_PORT: 4433
    HTTPS_ENABLED: true
    HTTPS_RSA_PUBLIC_KEY_FILE: "./scripts/cert/pki/server-cert/api.nikkierp.com.crt"
    HTTPS_RSA_PRIVATE_KEY_FILE: "./scripts/cert/pki/server-cert/api.nikkierp.com.key"
    CORS_ENABLED: true
    # Allowed origins for Cross-Origin Resource Sharing
    CORS_ORIGINS: "*"
    # Allowed headers for Cross-Origin Resource Sharing
    CORS_HEADERS: "Accept,Authorization,Content-Type,Origin"
    # Allowed methods for Cross-Origin Resource Sharing
    CORS_METHODS: "OPTIONS,HEAD,GET,POST,PUT,DELETE"
    MTLS_ENABLED: true
    MTLS_CLIENT_CA_CERT_FILE: "scripts/cert/pki/client-ca/nikkierp-client-ca.crt"
    MTLS_CLIENT_CERT_FILE: "scripts/cert/pki/client-cert/nikkierp-client-cert.crt"
    MTLS_CLIENT_KEY_FILE: "scripts/cert/pki/client-cert/nikkierp-client-cert.key"
  HTTP_CLIENT:
    # Milisecond
    REQUEST_TIMEOUT: 30000

    # Skip verify third server cert
    INSECURE_SKIP_VERIFY: false
    INCLUDE_SYSTEM_TRUSTED_CA: true
    TRUSTED_CA_CERTS_FILE:

    CLIENT_CERT_ENABLED: false
    # Client cert file config is either Key-pair or P12
    # Key-pair
    CLIENT_CERT_FILE: ""
    CLIENT_KEY_FILE: ""

    # P12 and password
    CLIENT_P12_FILE: ""
    CLIENT_P12_PASSWORD: ""
  TOKEN:
    # Secret key for JWT token signing and verification
    # IMPORTANT: Override this in local.env or production environment
    # DO NOT commit real secret keys to version control
    SECRET_KEY: "your-secret-key-here-change-in-production"
    # Token expiry time in hours
    EXPIRY_HOURS: 24

  REDIS:
    HOST: "localhost"
    PORT: 6379
    DB: 1
    PASSWORD: ""
  REQUEST_GUARD:
    ACCESS_TOKEN_ENABLED: true
    ACCESS_TOKEN_DPOP_ENABLED: false
    # Supported algorithms: HS256 | RS256
    # If using HS256, ACCESS_TOKEN_SHA256_SECRET must be specified.
    # If using RS256, ACCESS_TOKEN_RSA_PUBLIC_KEY and ACCESS_TOKEN_RSA_PRIVATE_KEY must be specified.
    ACCESS_TOKEN_ALGORITHM: "EdDSA"
    ACCESS_TOKEN_EXPIRY_MINUTES: 3
    ACCESS_TOKEN_ISSUER: "nikki-erp"
    ACCESS_TOKEN_HTTP_HEADER_NAME: "Authorization"
    # Leading and trailing whitespace will be trimmed from this prefix
    # before prepending it to the access token value.
    # The result header: "{Prefix} {AccessToken}"
    ACCESS_TOKEN_HTTP_HEADER_PREFIX: "Bearer"
    ACCESS_TOKEN_SECRET: "your-secret-key-here-change-in-production"
    ACCESS_TOKEN_PUBLIC_KEY_FILE: "scripts/cert/pki/jwt-keypair/ed25519.pub"
    ACCESS_TOKEN_PRIVATE_KEY_FILE: "scripts/cert/pki/jwt-keypair/ed25519.key"
    # Refresh token expiry time in minutes.
    REFRESH_TOKEN_EXPIRY_MINUTES: 30
    SESSION_BLACKLIST_ENABLED: false

AUTHENTICATE:
  # Number of seconds before a login attempt expires
  LOGIN_ATTEMPT_DURATION_SECS: 300
